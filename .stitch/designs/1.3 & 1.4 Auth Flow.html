<style>

<body class="paper-texture min-h-screen selection:bg-verified-gold/30">

<section class="w-full max-w-[440px] flex flex-col items-center" id="login-frame">
<div class="mb-8 text-center">

</div>
<div class="bg-white border border-rule-grey w-full p-lg flex flex-col gap-xl">
<header class="border-b border-rule-grey pb-md flex justify-between items-end">
<h2 class="font-headline-md text-headline-md">Welcome back</h2>
<span class="material-symbols-outlined text-verified-gold" data-icon="verified_user" style="font-variation-settings: 'FILL' 1;">verified_user</span>
</header>
<form class="flex flex-col gap-lg" onsubmit="event.preventDefault(); document.getElementById('login-frame').classList.add('hidden'); document.getElementById('otp-frame').classList.remove('hidden');">

<input class="w-full h-12 px-4 rounded-lg border border-rule-grey text-body-md font-body-md focus:ring-1 focus:ring-ink-navy transition-all" placeholder="student@university.edu" required="" type="email"/>
</div>
<div class="space-y-xs">

</div>

</div>
<button class="w-full bg-ink-navy text-white font-label-caps text-label-caps h-12 rounded-lg hover:bg-on-primary-fixed-variant active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">

</button>

<footer class="pt-md border-t border-rule-grey flex justify-center">
<p class="font-body-md text-on-surface-variant text-[14px]">

<input class="otp-input rounded-lg focus:border-verified-gold" maxlength="1" type="text"/>

<!-- Micro-interactions & Scripts -->
<script>
        // OTP Focus Shifting
        const inputs = document.querySelectorAll('.otp-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        // Simple Countdown Timer
        let time = 14 * 60 + 32;
        const timerElement = document.getElementById('timer');
        
        const updateTimer = () => {
            const minutes = Math.floor(time / 60);
            const seconds = time % 60;
            timerElement.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            if (time > 0) time--;
        };
        
        setInterval(updateTimer, 1000);

        // Visual "Stamp" effect on button click
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mousedown', () => {
                btn.style.boxShadow = 'inset 0 4px 6px rgba(0,0,0,0.2)';
            });
            btn.addEventListener('mouseup', () => {
                btn.style.boxShadow = 'none';
            });
        });
    </script>
